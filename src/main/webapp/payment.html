<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.payment-box{
width:500px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#fc8019;
margin-bottom:30px;
}

.option{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
font-size:18px;
cursor:pointer;
}

.option:hover{
background:#fff7f0;
border-color:#fc8019;
}

.btn{
width:100%;
background:#fc8019;
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
background:#e46f00;
}

</style>

</head>

<body>

<div class="payment-box">

<h1>💳 Select Payment Method</h1>

<form action="payment" method="post">

<div class="option">
<input type="radio" name="payment" value="Credit Card" required>
💳 Credit Card
</div>

<div class="option">
<input type="radio" name="payment" value="Debit Card">
💳 Debit Card
</div>

<div class="option">
<input type="radio" name="payment" value="UPI">
📱 UPI Payment
</div>

<div class="option">
<input type="radio" name="payment" value="Cash On Delivery">
💵 Cash On Delivery
</div>

<br>

<button type="submit" class="btn">
Proceed To Pay
</button>

</form>

</div>

</body>
</html>
