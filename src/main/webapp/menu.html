<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#fc8019;
padding:20px;
color:white;
text-align:center;
}

.foods{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
width:250px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px lightgray;
}

.price{
font-size:22px;
color:green;
}

button{
background:#fc8019;
color:white;
border:none;
padding:10px;
width:100%;
}

</style>

</head>
<body>

<div class="header">

<h1>Restaurant Menu</h1>

</div>

<div class="foods">

<div class="card">
<h3>Chicken Biryani</h3>
<p>Special Chicken Biryani</p>
<p class="price">₹250</p>
<button>Add To Cart</button>
</div>

<div class="card">
<h3>Masala Dosa</h3>
<p>Crispy Dosa</p>
<p class="price">₹90</p>
<button>Add To Cart</button>
</div>

<div class="card">
<h3>Zinger Burger</h3>
<p>KFC Special Burger</p>
<p class="price">₹220</p>
<button>Add To Cart</button>
</div>

</div>

</body>
</html>
